name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run eval suite with JSON output
        env:
          LLM_API_KEY: ${{ secrets.HF_API_KEY }}
        run: |
          llm-eval run \
            --suite examples/basic.yaml \
            --model meta-llama/Llama-3.1-8B-Instruct \
            --api-key $LLM_API_KEY \
            --output results.json

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: results.json